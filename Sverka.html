<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeaTable Data Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 28px; margin-bottom: 10px; color: #1a1a1a; }
        .employee-select { margin-bottom: 20px; }
        .employee-select label { font-weight: 600; margin-right: 10px; }
        .employee-select select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; min-width: 300px; }
        .export-btn { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-left: 10px; }
        .export-btn:hover { background: #1e40af; }
        .table-section { background: white; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .table-header { padding: 16px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 600; border-radius: 8px 8px 0 0; }
        .table-header:hover { background: #f1f5f9; }
        .table-content { padding: 16px; display: none; }
        .table-content.open { display: block; }
        .toggle-icon { font-size: 18px; color: #2563eb; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #2563eb; color: white; padding: 12px; text-align: left; font-weight: 600; }
        td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; }
        tr:hover { background: #f8fafc; }
        tr.total-row { background: #f1f5f9; font-weight: 600; border-top: 2px solid #2563eb; }
        .num { text-align: right; }
        .summary { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .summary-item { padding: 16px; background: #f8fafc; border-radius: 6px; border-left: 4px solid #2563eb; }
        .summary-label { font-size: 12px; color: #64748b; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
        .summary-value { font-size: 24px; font-weight: 700; color: #2563eb; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .no-data { text-align: center; padding: 40px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 SeaTable Dashboard</h1>
            <p>Анализ данных сотрудников</p>
        </div>

        <div class="employee-select">
            <label>Выберите сотрудника:</label>
            <select id="employeeSelect" onchange="loadEmployeeData()" style="width: auto;">
                <option value="">-- Сотрудник --</option>
            </select>
            <button class="export-btn" onclick="exportToExcel()">📥 Экспорт Excel</button>
        </div>

        <div id="summary" class="summary" style="display: none;">
            <div class="summary-row">
                <div class="summary-item">
                    <div class="summary-label">Переведено</div>
                    <div class="summary-value" id="summaryTransfered">0 ₽</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Табель и начисления</div>
                    <div class="summary-value" id="summaryPayroll">0 ₽</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">Потрачено</div>
                    <div class="summary-value" id="summaryDDS">0 ₽</div>
                </div>
                <div class="summary-item" style="border-left-color: #10b981;">
                    <div class="summary-label">Итоговый расчет</div>
                    <div class="summary-value" style="color: #10b981;" id="summaryTotal">0 ₽</div>
                </div>
            </div>
        </div>

        <div id="transferedSection" class="table-section" style="display: none;">
            <div class="table-header" onclick="toggleTable('transferred')">
                <span>💳 Переведено</span>
                <span class="toggle-icon" id="transferedIcon">▼</span>
            </div>
            <div id="transferedTable" class="table-content open"></div>
        </div>

        <div id="payrollSection" class="table-section" style="display: none;">
            <div class="table-header" onclick="toggleTable('payroll')">
                <span>📝 Табель и начисления</span>
                <span class="toggle-icon" id="payrollIcon">▼</span>
            </div>
            <div id="payrollTable" class="table-content open"></div>
        </div>

        <div id="ddsSection" class="table-section" style="display: none;">
            <div class="table-header" onclick="toggleTable('dds')">
                <span>💸 Потрачено (ДДС)</span>
                <span class="toggle-icon" id="ddsIcon">▼</span>
            </div>
            <div id="ddsTable" class="table-content open"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
        const BASE_URL = 'https://cloud.seatable.io';
        
        let state = {
            token: null,
            accessToken: null,
            dtableUuid: null,
            apiGateway: null,
            rows: {},
            colMaps: {},
            selectedEmployee: null,
            transferedTotal: 0,
            payrollTotal: 0,
            ddsTotal: 0
        };

        const paymentTypeMap = {
            '252877': 'Аванс',
            '995873': 'Суточные',
            '773433': 'Зарплата',
            '56362': 'Компенсация',
            '120118': 'Отпускные'
        };

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            if (typeof dateStr === 'string' && dateStr.includes('T')) {
                const date = new Date(dateStr.split('T')[0]);
                return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\./g, '-');
            }
            return dateStr;
        }

        function getNumValue(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            if (typeof val === 'string') {
                const num = parseFloat(val.replace(/[^\d.-]/g, ''));
                return isNaN(num) ? 0 : num;
            }
            if (typeof val === 'object' && val.value !== undefined) {
                return getNumValue(val.value);
            }
            return 0;
        }

        function getEmployeeName(field) {
            if (!field) return '';
            if (typeof field === 'string') return field;
            if (Array.isArray(field) && field.length > 0) {
                const obj = field[0];
                if (typeof obj === 'object' && obj.display_value) {
                    return obj.display_value;
                }
                return typeof obj === 'string' ? obj : (obj?.text || '');
            }
            return '';
        }

        function toggleTable(name) {
            const content = document.getElementById(name + 'Table');
            const icon = document.getElementById(name + 'Icon');
            content.classList.toggle('open');
            icon.textContent = content.classList.contains('open') ? '▼' : '▶';
        }

        async function getAccessToken() {
            const r = await fetch(`${BASE_URL}/api/v2.1/dtable/app-access-token/`, {
                headers: { Authorization: `Bearer ${state.token}` }
            });
            if (!r.ok) throw new Error('Неверный API Token');
            const d = await r.json();
            state.accessToken = d.access_token;
            state.dtableUuid = d.dtable_uuid;
            state.apiGateway = d.dtable_server || `${BASE_URL}/api-gateway/`;
        }

        async function fetchMetadata() {
            try {
                const r = await fetch(`${state.apiGateway}api/v2/dtables/${state.dtableUuid}/metadata/`, {
                    headers: { Authorization: `Token ${state.accessToken}` }
                });
                const d = await r.json();
                if (d.metadata && d.metadata.tables) {
                    d.metadata.tables.forEach(table => {
                        state.colMaps[table.name] = {};
                        if (table.columns) {
                            table.columns.forEach(col => {
                                state.colMaps[table.name][col.key] = col.name;
                            });
                        }
                    });
                }
            } catch (e) {
                console.warn('Ошибка при загрузке metadata:', e);
            }
        }

        async function makeRequest(endpoint) {
            const url = `${state.apiGateway}api/v2/dtables/${state.dtableUuid}${endpoint}`;
            const response = await fetch(url, {
                headers: {
                    'Authorization': `Token ${state.accessToken}`,
                    'Content-Type': 'application/json'
                }
            });
            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            return await response.json();
        }

        async function fetchAllRows(tableName) {
            try {
                let allRows = [];
                let start = 0;
                
                while (true) {
                    const r = await makeRequest(`/rows/?table_name=${encodeURIComponent(tableName)}&start=${start}&limit=1000`);
                    const rows = (r.rows || []).map(row => {
                        const processedRow = { _id: row._id };
                        for (let key in row) {
                            if (key.startsWith('_')) {
                                processedRow[key] = row[key];
                            } else {
                                const colName = state.colMaps[tableName]?.[key] || key;
                                processedRow[colName] = row[key];
                            }
                        }
                        return processedRow;
                    });
                    
                    allRows = allRows.concat(rows);
                    if (!r.rows || r.rows.length < 1000) break;
                    start += 1000;
                }
                
                return allRows;
            } catch (e) {
                console.warn(`Ошибка при загрузке ${tableName}:`, e);
                return [];
            }
        }

        async function loadEmployees() {
            try {
                state.rows.employees = await fetchAllRows('Сотрудники');
                const employeeSelect = document.getElementById('employeeSelect');
                employeeSelect.innerHTML = '<option value="">-- Сотрудник --</option>';

                const employees = [];
                state.rows.employees.forEach(row => {
                    let fio = row['ФИО'] || row['Имя'] || row['Name'];
                    if (!fio) {
                        for (let key in row) {
                            if (!key.startsWith('_') && typeof row[key] === 'string' && row[key].trim()) {
                                fio = row[key];
                                break;
                            }
                        }
                    }
                    
                    if (fio) {
                        employees.push({ fio, row });
                    }
                });

                employees.sort((a, b) => a.fio.localeCompare(b.fio, 'ru'));

                employees.forEach(({ fio, row }) => {
                    const option = document.createElement('option');
                    option.value = row._id;
                    option.textContent = fio;
                    option.dataset.fio = fio;
                    employeeSelect.appendChild(option);
                });
            } catch (e) {
                alert('Ошибка при загрузке сотрудников: ' + e.message);
            }
        }

        async function testConnection() {
            try {
                await getAccessToken();
                await fetchMetadata();
                await loadEmployees();
                document.getElementById('summary').style.display = 'block';
            } catch (e) {
                alert('Ошибка подключения: ' + e.message);
            }
        }

        const officeTypeMap = {
            '428862': 'О',
            '781593': 'П'
        };

        async function loadEmployeeData() {
            try {
                const select = document.getElementById('employeeSelect');
                const option = select.options[select.selectedIndex];
                
                if (!option.value) {
                    document.getElementById('transferedSection').style.display = 'none';
                    document.getElementById('payrollSection').style.display = 'none';
                    document.getElementById('ddsSection').style.display = 'none';
                    return;
                }

                const fio = option.dataset.fio;
                state.selectedEmployee = fio;

                // Get employee office/project type
                const employee = state.rows.employees.find(e => {
                    let efio = e['ФИО'] || e['Имя'] || e['Name'];
                    return efio === fio;
                });
                
                let officeTypeId = employee?.['Офис/проект'];
                if (Array.isArray(officeTypeId) && officeTypeId.length > 0) {
                    officeTypeId = officeTypeId[0]?.display_value || officeTypeId[0]?.row_id || officeTypeId[0];
                }
                const officeType = officeTypeMap[String(officeTypeId)] || 'П';

                state.rows.transferred = await fetchAllRows('Переведено');
                state.rows.payroll = await fetchAllRows('Табель и начисления');
                state.rows.dds = await fetchAllRows('ДДС');

                let filteredTransfered = state.rows.transferred.filter(row => 
                    getEmployeeName(row['Сотрудник']) === fio
                );

                // Filter payment types based on office/project
                const excludePayments = officeType === 'О' 
                    ? ['120118', '773433', '252877'] // Отпускные, Зарплата, Аванс
                    : ['120118']; // Отпускные
                
                filteredTransfered = filteredTransfered.filter(row => 
                    !excludePayments.includes(String(row['Назначение платежа']))
                );

                const filteredPayroll = state.rows.payroll.filter(row => 
                    getEmployeeName(row['Сотрудник']) === fio
                );
                const filteredDDS = state.rows.dds.filter(row => 
                    getEmployeeName(row['Оплата']) === fio
                );

                state.transferedTotal = renderTransferedTable(filteredTransfered);
                state.payrollTotal = renderPayrollTable(filteredPayroll);
                state.ddsTotal = renderDDSTable(filteredDDS);

                updateSummary();

                document.getElementById('transferedSection').style.display = filteredTransfered.length > 0 ? 'block' : 'none';
                document.getElementById('payrollSection').style.display = filteredPayroll.length > 0 ? 'block' : 'none';
                document.getElementById('ddsSection').style.display = filteredDDS.length > 0 ? 'block' : 'none';
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        function renderTransferedTable(rows) {
            const container = document.getElementById('transferedTable');
            if (rows.length === 0) {
                container.innerHTML = '<div class="no-data">Нет данных</div>';
                return 0;
            }

            let html = '<table><thead><tr><th>Дата</th><th>Сумма</th><th>Назначение платежа</th></tr></thead><tbody>';
            let total = 0;

            rows.forEach(row => {
                let sumVal = getNumValue(row['Сумма']);
                total += sumVal;
                let paymentVal = paymentTypeMap[String(row['Назначение платежа'])] || row['Назначение платежа'] || '-';
                html += `<tr><td>${formatDate(row['Дата'])}</td><td class="num">${sumVal.toLocaleString('ru-RU')}</td><td>${paymentVal}</td></tr>`;
            });

            html += `<tr class="total-row"><td colspan="2" style="text-align: right;">ИТОГО:</td><td class="num">${total.toLocaleString('ru-RU')}</td></tr>`;
            html += '</tbody></table>';
            container.innerHTML = html;
            return total;
        }

        function renderPayrollTable(rows) {
            const container = document.getElementById('payrollTable');
            if (rows.length === 0) {
                container.innerHTML = '<div class="no-data">Нет данных</div>';
                return 0;
            }

            let html = '<table><thead><tr><th>Суточные</th><th>Начало</th><th>Конец</th><th>Кол-во дней</th><th>Проект</th><th>ИТОГО НАЧИСЛЕНО</th></tr></thead><tbody>';
            let total = 0;

            rows.forEach(row => {
                let суточныеVal = row['Фикс суточные'];
                if (!суточныеVal || суточныеVal === 0 || суточныеVal === '') {
                    let arr = row['Суточные'];
                    суточныеVal = Array.isArray(arr) && arr.length > 0 ? arr[0] : arr;
                }
                суточныеVal = Math.round(getNumValue(суточныеVal));

                let projVal = row['Проект'];
                if (Array.isArray(projVal) && projVal.length > 0) {
                    projVal = projVal[0]?.display_value || projVal[0] || '-';
                } else {
                    projVal = projVal || '-';
                }

                let totVal = getNumValue(row['ИТОГО НАЧИСЛЕНО']);
                total += totVal;

                html += `<tr><td>${суточныеVal}</td><td>${formatDate(row['Начало'])}</td><td>${formatDate(row['Конец'])}</td><td>${getNumValue(row['Кол-во дней']).toLocaleString('ru-RU')}</td><td>${projVal}</td><td class="num">${totVal.toLocaleString('ru-RU')}</td></tr>`;
            });

            html += `<tr class="total-row"><td colspan="5" style="text-align: right;">ИТОГО:</td><td class="num">${total.toLocaleString('ru-RU')}</td></tr>`;
            html += '</tbody></table>';
            container.innerHTML = html;
            return total;
        }

        function renderDDSTable(rows) {
            const container = document.getElementById('ddsTable');
            if (rows.length === 0) {
                container.innerHTML = '<div class="no-data">Нет данных</div>';
                return 0;
            }

            let html = '<table><thead><tr><th>Код проекта</th><th>Дата</th><th>Сумма</th><th>Назначение платежа</th></tr></thead><tbody>';
            let total = 0;

            rows.forEach(row => {
                let projVal = row['Код проекта'];
                if (Array.isArray(projVal) && projVal.length > 0) {
                    projVal = projVal[0]?.display_value || projVal[0] || '-';
                } else {
                    projVal = projVal || '-';
                }

                let sumVal = getNumValue(row['Сумма']);
                total += sumVal;

                html += `<tr><td>${projVal}</td><td>${formatDate(row['Дата'])}</td><td class="num">${sumVal.toLocaleString('ru-RU')}</td><td>${row['Назначение платежа'] || '-'}</td></tr>`;
            });

            html += `<tr class="total-row"><td colspan="2" style="text-align: right;">ИТОГО:</td><td class="num">${total.toLocaleString('ru-RU')}</td><td></td></tr>`;
            html += '</tbody></table>';
            container.innerHTML = html;
            return total;
        }

        function updateSummary() {
            const result = state.payrollTotal + state.ddsTotal - state.transferedTotal;
            document.getElementById('summaryTransfered').textContent = state.transferedTotal.toLocaleString('ru-RU') + ' ₽';
            document.getElementById('summaryPayroll').textContent = state.payrollTotal.toLocaleString('ru-RU') + ' ₽';
            document.getElementById('summaryDDS').textContent = state.ddsTotal.toLocaleString('ru-RU') + ' ₽';
            document.getElementById('summaryTotal').textContent = result.toLocaleString('ru-RU') + ' ₽';
        }

        async function exportToExcel() {
            if (!state.selectedEmployee) {
                alert('Выберите сотрудника');
                return;
            }

            const wb = XLSX.utils.book_new();
            
            // Sheet 1: Переведено
            let transferedData = [['Дата', 'Сумма', 'Назначение платежа']];
            document.querySelectorAll('#transferedTable tbody tr:not(.total-row)').forEach(row => {
                let cells = row.querySelectorAll('td');
                transferedData.push([cells[0].textContent, cells[1].textContent, cells[2].textContent]);
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(transferedData), 'Переведено');

            // Sheet 2: Табель и начисления
            let payrollData = [['Суточные', 'Начало', 'Конец', 'Кол-во дней', 'Проект', 'ИТОГО НАЧИСЛЕНО']];
            document.querySelectorAll('#payrollTable tbody tr:not(.total-row)').forEach(row => {
                let cells = row.querySelectorAll('td');
                payrollData.push([cells[0].textContent, cells[1].textContent, cells[2].textContent, cells[3].textContent, cells[4].textContent, cells[5].textContent]);
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(payrollData), 'Табель и начисления');

            // Sheet 3: Потрачено
            let ddsData = [['Код проекта', 'Дата', 'Сумма', 'Назначение платежа']];
            document.querySelectorAll('#ddsTable tbody tr:not(.total-row)').forEach(row => {
                let cells = row.querySelectorAll('td');
                ddsData.push([cells[0].textContent, cells[1].textContent, cells[2].textContent, cells[3].textContent]);
            });
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ddsData), 'Потрачено');

            // Sheet 4: Итоговый расчет
            let summary = [
                ['Показатель', 'Сумма'],
                ['Переведено', state.transferedTotal],
                ['Табель и начисления', state.payrollTotal],
                ['Потрачено', state.ddsTotal],
                ['Итоговый расчет', state.payrollTotal + state.ddsTotal - state.transferedTotal]
            ];
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Итоговый расчет');

            XLSX.writeFile(wb, `${state.selectedEmployee}_report.xlsx`);
        }

        // Initialize
        if (localStorage.getItem('seatable_token')) {
            state.token = localStorage.getItem('seatable_token');
            testConnection();
        } else {
            const token = prompt('Введите API Token:');
            const dtableName = prompt('Введите название базы:', 'Управление компаниями');
            if (token) {
                state.token = token;
                localStorage.setItem('seatable_token', token);
                localStorage.setItem('seatable_dtable_name', dtableName);
                testConnection();
            }
        }
    </script>
</body>
</html>
